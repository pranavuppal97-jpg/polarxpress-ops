<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PX Ops">
  <meta name="theme-color" content="#0a0e1a">
  <title>Polar Xpress — Ops</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     ACCESS RESTRICTED SCREEN
═══════════════════════════════════════════════════════ -->
<div id="access-screen" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🔒</div>
      <h1>Access Restricted</h1>
      <p>This device is not registered</p>
    </div>
    <div id="access-msg" style="text-align:center;padding:16px 8px;color:var(--text3);font-size:0.9rem;line-height:1.5">
      Ask Pranav, Raj, or Tej for an invite link to register this device.
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">❄</div>
      <h1>Polar Xpress</h1>
      <p>Operations System</p>
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <div class="pin-display">
      <div class="pin-dots" id="pin-dots">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" data-digit="1">1</button>
      <button class="pin-btn" data-digit="2">2</button>
      <button class="pin-btn" data-digit="3">3</button>
      <button class="pin-btn" data-digit="4">4</button>
      <button class="pin-btn" data-digit="5">5</button>
      <button class="pin-btn" data-digit="6">6</button>
      <button class="pin-btn" data-digit="7">7</button>
      <button class="pin-btn" data-digit="8">8</button>
      <button class="pin-btn" data-digit="9">9</button>
      <button class="pin-btn pin-clear" id="pin-clear">⌫</button>
      <button class="pin-btn" data-digit="0">0</button>
      <button class="pin-btn pin-enter" id="pin-enter">→</button>
    </div>
    <p class="login-hint">Enter your PIN to continue</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════ -->
<div id="app-shell" class="hidden">

  <!-- Top Header -->
  <header id="app-header">
    <div class="header-left">
      <button id="back-btn" class="icon-btn hidden">←</button>
      <div class="header-title-group">
        <h2 id="page-title">Dashboard</h2>
        <span id="page-subtitle" class="page-subtitle"></span>
      </div>
    </div>
    <div class="header-right">
      <span id="user-badge" class="user-badge"></span>
      <button id="logout-btn" class="icon-btn" title="Logout">⏻</button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content"></main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-page="dashboard">
      <span class="nav-icon">◈</span>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-page="sales">
      <span class="nav-icon">₹</span>
      <span>Sales</span>
    </button>
    <button class="nav-btn" data-page="staff">
      <span class="nav-icon">👥</span>
      <span>Staff</span>
    </button>
    <button class="nav-btn" data-page="expenses">
      <span class="nav-icon">📋</span>
      <span>Expenses</span>
    </button>
    <button class="nav-btn" data-page="more-menu">
      <span class="nav-icon">⋯</span>
      <span>More</span>
    </button>
  </nav>

  <!-- More Menu Overlay -->
  <div id="more-overlay" class="overlay hidden">
    <div class="more-menu">
      <div class="more-header">
        <span>More</span>
        <button id="close-more" class="icon-btn">✕</button>
      </div>
      <button class="more-item" data-page="reconciliation">
        <span class="more-item-icon">💵</span>
        <div>
          <strong>Cash Reconciliation</strong>
          <p>Count cash & verify against POS</p>
        </div>
      </button>
      <button class="more-item" data-page="inventory">
        <span class="more-item-icon">📦</span>
        <div>
          <strong>Inventory</strong>
          <p>Stock levels & daily consumption</p>
        </div>
      </button>
      <button class="more-item" data-page="sops">
        <span class="more-item-icon">📄</span>
        <div>
          <strong>SOPs</strong>
          <p>Checklists & procedures</p>
        </div>
      </button>
      <button class="more-item" data-page="vendors">
        <span class="more-item-icon">🏪</span>
        <div>
          <strong>Vendors</strong>
          <p>Supplier contacts, add / edit / delete</p>
        </div>
      </button>
      <button class="more-item" data-page="tasks">
        <span class="more-item-icon">✅</span>
        <div>
          <strong>Task Tracker</strong>
          <p>Opening, shift & closing checklists</p>
        </div>
      </button>
      <button class="more-item owner-only" data-page="pnl">
        <span class="more-item-icon">📊</span>
        <div>
          <strong>Profit & Loss</strong>
          <p>Revenue, expenses & net margins</p>
        </div>
      </button>
      <button class="more-item" data-page="products">
        <span class="more-item-icon">🏷</span>
        <div>
          <strong>Product Tracker</strong>
          <p>Daily sales, food cost & packaging</p>
        </div>
      </button>
      <button class="more-item" data-page="manage">
        <span class="more-item-icon">✏️</span>
        <div>
          <strong>Manage Items</strong>
          <p>Edit or delete inventory, expenses & SOPs</p>
        </div>
      </button>
      <button class="more-item owner-only" data-page="settings">
        <span class="more-item-icon">⚙</span>
        <div>
          <strong>Settings</strong>
          <p>Staff, PINs & app config</p>
        </div>
      </button>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL CONTAINER
═══════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="overlay hidden">
  <div id="modal-box" class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close" class="icon-btn">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer" class="modal-footer"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
<script src="app.js"></script>
</body>
</html>
