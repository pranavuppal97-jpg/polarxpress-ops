<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#0a0e1a"/>
  <circle cx="256" cy="256" r="196" fill="#00bcd4" opacity="0.1"/>
  <!-- 6-arm snowflake -->
  <line x1="256" y1="68" x2="256" y2="444" stroke="#4dd0e1" stroke-width="22" stroke-linecap="round"/>
  <line x1="68" y1="256" x2="444" y2="256" stroke="#4dd0e1" stroke-width="22" stroke-linecap="round"/>
  <line x1="256" y1="68" x2="256" y2="444" stroke="#4dd0e1" stroke-width="22" stroke-linecap="round" transform="rotate(60 256 256)"/>
  <line x1="256" y1="68" x2="256" y2="444" stroke="#4dd0e1" stroke-width="22" stroke-linecap="round" transform="rotate(-60 256 256)"/>
  <!-- Branch tips — top arm -->
  <line x1="256" y1="108" x2="208" y2="156" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="108" x2="304" y2="156" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <!-- Branch tips — bottom arm -->
  <line x1="256" y1="404" x2="208" y2="356" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="404" x2="304" y2="356" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <!-- Branch tips — left arm -->
  <line x1="108" y1="256" x2="156" y2="208" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <line x1="108" y1="256" x2="156" y2="304" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <!-- Branch tips — right arm -->
  <line x1="404" y1="256" x2="356" y2="208" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <line x1="404" y1="256" x2="356" y2="304" stroke="#4dd0e1" stroke-width="14" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="256" cy="256" r="32" fill="#4dd0e1"/>
  <circle cx="256" cy="256" r="14" fill="#0a0e1a"/>
</svg>
